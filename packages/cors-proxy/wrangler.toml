name = "wiki3-ai-sync-proxy"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[vars]
# Create an OAuth App at:
#   https://github.com/organizations/wiki3-ai/settings/applications
# Name: "Wiki3.ai Sync", enable Device Flow, no callback URL needed.
# Then set the credentials:
# GITHUB_CLIENT_ID = "your-oauth-app-client-id"
# GITHUB_CLIENT_SECRET = "your-oauth-app-client-secret"

# CLOUDFLARE_ACCOUNT_ID="your-account-id-here"
# export CLOUDFLARE_API_TOKEN="your-token-here"
# npx wrangler deploy
# npx wrangler secret put GITHUB_CLIENT_ID
# npx wrangler secret put GITHUB_CLIENT_SECRET

# Allowed origins (comma-separated). Set to "*" for any, or restrict to your site.
ALLOWED_ORIGINS = "https://wiki3-ai.github.io"
